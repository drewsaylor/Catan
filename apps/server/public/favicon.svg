<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4A8"/>
      <stop offset="50%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A0693A"/>
      <stop offset="100%" style="stop-color:#6B4423"/>
    </linearGradient>
  </defs>

  <!-- Hexagon background (Catan hex shape) -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="url(#wood)" stroke="#4A2F18" stroke-width="1.5"/>

  <!-- C letter -->
  <text x="16" y="23" text-anchor="middle"
        font-family="Georgia, serif"
        font-size="18" font-weight="bold"
        fill="url(#gold)"
        stroke="#3D2415" stroke-width="1"
        paint-order="stroke fill">C</text>
</svg>
